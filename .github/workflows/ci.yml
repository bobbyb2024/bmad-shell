name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Ruff check
        run: uv run ruff check .
      - name: Pyright
        run: uv run pyright
      - name: Pytest
        run: uv run pytest
      - name: Import Linter
        run: uv run lint-imports
